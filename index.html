<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="/manifest.json">
<title>솔이숲농장 대시보드</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- 상단 고정: 헤더 + 탭 -->
<div class="sticky-top">
  <div class="header">
    <h1>🌲 솔이숲농장 현황</h1>
    <span class="update" id="update-time"></span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchCrop('포도',this)">🍇 포도</button>
    <button class="tab" onclick="switchCrop('수박',this)">🍉 수박</button>
    <button class="tab" onclick="switchCrop('양상추',this)">🥬 양상추</button>
  </div>
</div>

<!-- 본문 -->
<div class="content">

  <div class="card">
    <div class="card-label">오늘 할 일</div>
    <div id="tasks-area"><div class="empty">불러오는 중...</div></div>
  </div>

  <div class="card" id="weather-card">
    <div class="card-label">오늘 기상 · 충남 부여</div>
    <div class="empty">불러오는 중...</div>
  </div>

  <div class="card" id="gdd-card">
    <div class="card-label">적산온도</div>
    <div class="empty">불러오는 중...</div>
  </div>

  <div class="card" id="harvest-card" style="display:none">
    <div class="card-label">수확량 예측</div>
  </div>

  <div class="card" id="water-card">
    <div class="card-label">관수 현황</div>
    <div class="empty">불러오는 중...</div>
  </div>

  <div class="card" id="safety-card">
    <div class="card-label">방제 이력</div>
    <div class="empty">불러오는 중...</div>
  </div>

  <div class="card" id="disease-card">
    <div class="card-label">병해 경보</div>
    <div class="empty">불러오는 중...</div>
  </div>

</div>

<script src="/js/config.js"></script>
<script src="/js/weather.js"></script>
<script src="/js/gdd.js"></script>
<script src="/js/water.js"></script>
<script src="/js/pest.js"></script>
<script src="/js/tasks.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
