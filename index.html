<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="/manifest.json">
<title>🌳솔이숲농장 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,sans-serif;max-width:480px;margin:0 auto;padding:12px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.header h1{font-size:16px;font-weight:600;color:#94a3b8;}
.update{font-size:11px;color:#475569;}
.tabs{display:flex;gap:6px;margin-bottom:12px;}
.tab{flex:1;padding:8px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;background:#1e293b;color:#64748b;transition:all .2s;}
.tab.active{background:#3b82f6;color:#fff;}
.card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:10px;}
.card-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.today-tasks{display:flex;flex-direction:column;gap:6px;}
.task{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:13px;}
.task-urgent{background:#7f1d1d22;border:1px solid #7f1d1d;}
.task-normal{background:#0f172a;}
.task-icon{font-size:16px;flex-shrink:0;}
.weather-main{display:flex;align-items:baseline;gap:12px;}
.temp-big{font-size:38px;font-weight:700;color:#f1f5f9;}
.weather-info{display:flex;flex-direction:column;gap:2px;}
.weather-sub{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;}
.weather-sub span{font-size:12px;color:#94a3b8;}
.gdd-main{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.gdd-val{font-size:28px;font-weight:700;color:#f1f5f9;}
.gdd-pct{font-size:22px;font-weight:700;color:#06b6d4;}
.bar-bg{background:#0f172a;border-radius:6px;height:10px;margin:6px 0;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#3b82f6,#06b6d4);transition:width 1s ease;}
.stage-labels{display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-bottom:8px;}
.meta-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;}
.meta-row span{font-size:12px;color:#94a3b8;}
.meta-row strong{color:#e2e8f0;}
.water-list{display:flex;flex-direction:column;gap:4px;}
.water-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #0f172a;font-size:13px;}
.water-item:last-child{border-bottom:none;}
.water-zone{color:#94a3b8;font-size:11px;margin-top:1px;}
.water-date{font-size:11px;color:#64748b;flex-shrink:0;margin-left:8px;}
.water-amount{font-weight:600;color:#38bdf8;flex-shrink:0;}
.disease-none{text-align:center;padding:12px 0;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
.dot-g{background:#10b981;}.dot-y{background:#f59e0b;}.dot-r{background:#ef4444;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;margin-right:6px;}
.badge-g{background:#064e3b;color:#6ee7b7;}
.badge-y{background:#78350f;color:#fcd34d;}
.badge-r{background:#7f1d1d;color:#fca5a5;}
.badge-crop{background:#1e3a5f;color:#93c5fd;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:4px;}
.harvest-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.harvest-val{font-size:22px;font-weight:700;color:#f1f5f9;}
.harvest-sub{font-size:12px;color:#94a3b8;margin-top:2px;}
.safety-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #0f172a;font-size:12px;}
.safety-item:last-child{border-bottom:none;}
.safety-days{font-weight:600;}
.safety-ok{color:#10b981;}.safety-warn{color:#f59e0b;}.safety-danger{color:#ef4444;}
.empty{font-size:13px;color:#475569;text-align:center;padding:12px 0;}
.section-title{font-size:12px;color:#64748b;margin-bottom:6px;font-weight:500;}
</style>
</head>
<body>

<div class="header">
  <h1>🌳솔이숲농장 운영 현황</h1>
  <span class="update" id="update-time"></span>
</div>

<!-- 오늘 할 일 -->
<div class="card">
  <div class="card-label">오늘 할 일</div>
  <div class="today-tasks" id="tasks-area">
    <div class="empty">불러오는 중...</div>
  </div>
</div>

<!-- 기상 -->
<div class="card" id="weather-card">
  <div class="card-label">오늘 기상 · 충남 부여</div>
  <div class="empty">불러오는 중...</div>
</div>

<!-- 작물 탭 -->
<div class="tabs">
  <button class="tab active" onclick="switchCrop('포도',this)">🍇 포도</button>
  <button class="tab" onclick="switchCrop('수박',this)">🍉 수박</button>
  <button class="tab" onclick="switchCrop('양상추',this)">🥬 양상추</button>
</div>

<!-- 적산온도 -->
<div class="card" id="gdd-card">
  <div class="card-label">적산온도</div>
  <div class="empty">불러오는 중...</div>
</div>

<!-- 수확량 예측 (포도만) -->
<div class="card" id="harvest-card" style="display:none">
  <div class="card-label">수확량 예측</div>
  <div class="empty">착과 데이터 입력 후 표시</div>
</div>

<!-- 관수 이력 -->
<div class="card" id="water-card">
  <div class="card-label">최근 관수</div>
  <div class="empty">불러오는 중...</div>
</div>

<!-- 방제 안전기간 -->
<div class="card" id="safety-card">
  <div class="card-label">방제 안전기간</div>
  <div class="empty">불러오는 중...</div>
</div>

<!-- 병해 경보 -->
<div class="card" id="disease-card">
  <div class="card-label">병해 경보</div>
  <div class="empty">불러오는 중...</div>
</div>

<script>
let ALL_DATA = {};
let CURRENT_CROP = '포도';

const CROP_CONFIG = {
  '포도': { baseTemp: 10, gddTarget: 1200, goalKg: 2000, emoji: '🍇' },
  '수박': { baseTemp: 12, gddTarget: 800,  goalKg: 0,    emoji: '🍉' },
  '양상추': { baseTemp: 5,  gddTarget: 400,  goalKg: 0,    emoji: '🥬' },
};

async function loadData() {
  try {
    const res = await fetch('/api/sheets');
    ALL_DATA = await res.json();
    renderAll();
    document.getElementById('update-time').textContent =
      new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) + ' 업데이트';
  } catch(e) {
    console.error(e);
  }
}

function switchCrop(crop, btn) {
  CURRENT_CROP = crop;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderCropCards();
}

function renderAll() {
  renderWeather(ALL_DATA['기상'] || []);
  renderTasks();
  renderCropCards();
}

function renderCropCards() {
  renderGDD(ALL_DATA['작기정보'] || []);
  renderWater(ALL_DATA[CURRENT_CROP + '_관수'] || []);
  renderDisease(ALL_DATA[CURRENT_CROP + '_병해'] || []);
  renderSafety(ALL_DATA[CURRENT_CROP + '_방제'] || []);
  renderHarvest();
}

function renderWeather(rows) {
  const card = document.getElementById('weather-card');
  if (rows.length < 2) { card.innerHTML = '<div class="card-label">오늘 기상 · 충남 부여</div><div class="empty">데이터 없음</div>'; return; }
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const todayRows = rows.slice(1).filter(r => String(r[1]) === today);
  if (!todayRows.length) {
    const last = rows.slice(1).filter(r=>r[3]).slice(-1)[0];
    card.innerHTML = `<div class="card-label">최근 기상 · 충남 부여</div>
      <div class="weather-main"><div class="temp-big">${last?.[3] ?? '-'}°</div>
      <div class="weather-info"><span style="font-size:13px;color:#94a3b8">${last?.[7]??'-'}</span></div></div>
      <div class="weather-sub"><span>오늘 데이터 수집 중</span></div>`;
    return;
  }
  const temps = todayRows.map(r=>parseFloat(r[3])).filter(v=>!isNaN(v));
  const humids = todayRows.map(r=>parseFloat(r[4])).filter(v=>!isNaN(v));
  const rains = todayRows.map(r=>parseFloat(r[5])).filter(v=>!isNaN(v));
  const sky = todayRows[Math.floor(todayRows.length/2)]?.[7] || '-';
  const maxT = temps.length ? Math.max(...temps) : '-';
  const minT = temps.length ? Math.min(...temps) : '-';
  const avgH = humids.length ? Math.round(humids.reduce((a,b)=>a+b,0)/humids.length) : '-';
  const maxR = rains.length ? Math.max(...rains) : 0;
  const skyEmoji = sky==='맑음'?'☀️':sky==='구름많음'?'⛅':sky==='흐림'?'☁️':'🌤️';
  card.innerHTML = `<div class="card-label">오늘 기상 · 충남 부여</div>
    <div class="weather-main">
      <div class="temp-big">${maxT}°</div>
      <div class="weather-info"><span style="font-size:28px">${skyEmoji}</span><span style="font-size:12px;color:#94a3b8">${sky}</span></div>
    </div>
    <div class="weather-sub">
      <span>최저 <strong style="color:#e2e8f0">${minT}°</strong></span>
      <span>습도 <strong style="color:#e2e8f0">${avgH}%</strong></span>
      <span>강수확률 <strong style="color:#e2e8f0">${maxR}%</strong></span>
    </div>`;
}

function renderTasks() {
  const area = document.getElementById('tasks-area');
  const tasks = [];
  const today = new Date();

  // 관수 체크
  const waterRows = (ALL_DATA['포도_관수'] || []).slice(1).filter(r=>r[2]);
  if (waterRows.length) {
    const lastDate = new Date(waterRows[waterRows.length-1][2]);
    const diff = Math.floor((today - lastDate) / 86400000);
    if (diff >= 3) tasks.push({icon:'💧', text:`포도 마지막 관수 ${diff}일 경과 — 관수 확인 필요`, urgent: diff >= 5});
  }

  // 방제 안전기간
  ['포도','수박','양상추'].forEach(crop => {
    const rows = (ALL_DATA[crop+'_방제'] || []).slice(1).filter(r=>r[2]&&r[9]);
    if (rows.length) {
      const last = rows[rows.length-1];
      const pestDate = new Date(last[2]);
      const safeDays = parseInt(last[9]) || 0;
      const elapsed = Math.floor((today - pestDate) / 86400000);
      const remaining = safeDays - elapsed;
      if (remaining > 0 && remaining <= 3) {
        tasks.push({icon:'⚠️', text:`${crop} 방제 안전기간 ${remaining}일 남음`, urgent: remaining <= 1});
      }
    }
  });

  // 적산온도 기반
  const seasonRows = (ALL_DATA['작기정보'] || []).slice(1);
  seasonRows.forEach(row => {
    const crop = row[1];
    const current = parseFloat(row[12]) || 0;
    const target = parseFloat(row[9]) || 1;
    const pct = (current/target)*100;
    if (pct >= 78 && pct < 85) tasks.push({icon:'🔍', text:`${crop} 적산온도 ${Math.round(pct)}% — 당도 측정 시작하세요`, urgent:false});
    if (pct >= 85) tasks.push({icon:'🍇', text:`${crop} 수확 적기 진입 — 수확 준비하세요`, urgent:true});
  });

  // 병해 의심
  ['포도','수박','양상추'].forEach(crop => {
    const rows = (ALL_DATA[crop+'_병해'] || []).slice(1).filter(r=>r[2]);
    if (rows.length) {
      const last = rows[rows.length-1];
      const severity = last[5] || '';
      if (severity === '중' || severity === '중증') {
        tasks.push({icon:'🚨', text:`${crop} 병해 경보 — ${last[3]||''} 확인 필요`, urgent:true});
      }
    }
  });

  if (!tasks.length) tasks.push({icon:'✅', text:'오늘 특이사항 없음', urgent:false});

  area.innerHTML = tasks.map(t => `
    <div class="task ${t.urgent?'task-urgent':'task-normal'}">
      <span class="task-icon">${t.icon}</span>
      <span style="font-size:13px">${t.text}</span>
    </div>
  `).join('');
}

function renderGDD(rows) {
  const card = document.getElementById('gdd-card');
  const cfg = CROP_CONFIG[CURRENT_CROP];
  const dataRow = rows.slice(1).find(r => r[1] === CURRENT_CROP);

  if (!dataRow) {
    card.innerHTML = `<div class="card-label">적산온도 · ${CURRENT_CROP}</div><div class="empty">작기 정보 없음</div>`;
    document.getElementById('harvest-card').style.display = 'none';
    return;
  }

  const current = parseFloat(dataRow[12]) || 0;
  const target = parseFloat(dataRow[9]) || cfg.gddTarget;
  const progress = Math.min(100, Math.round((current/target)*100));
  const startDate = dataRow[3] ? new Date(dataRow[3]) : null;
  const targetDate = dataRow[4] ? new Date(dataRow[4]) : null;
  const today = new Date();

  const daysSinceStart = startDate ? Math.floor((today-startDate)/86400000) : '-';
  const daysToHarvest = targetDate ? Math.floor((targetDate-today)/86400000) : '-';

  let stage = '발아·발근기'; let stageIdx = 0;
  if (progress >= 20) { stage = '신초신장기'; stageIdx = 1; }
  if (progress >= 50) { stage = '착과·비대기'; stageIdx = 2; }
  if (progress >= 80) { stage = '수확 적기 진입'; stageIdx = 3; }

  const stages = ['발아·발근','신초신장','착과·비대','수확적기'];

  card.innerHTML = `
    <div class="card-label">적산온도 · ${CURRENT_CROP}</div>
    <div class="gdd-main">
      <div class="gdd-val">${current.toFixed(1)}°C</div>
      <div class="gdd-pct">${progress}%</div>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${progress}%"></div></div>
    <div class="stage-labels">
      ${stages.map((s,i)=>`<span style="color:${i===stageIdx?'#94a3b8':'#334155'}">${s}</span>`).join('')}
    </div>
    <div style="font-size:12px;color:#94a3b8;margin-bottom:6px">현재 단계: <strong style="color:#e2e8f0">${stage}</strong></div>
    <div class="meta-row">
      <span>목표 <strong>${target}°C</strong></span>
      <span>작기 <strong>D+${daysSinceStart}</strong></span>
      <span>수확 예상 <strong style="color:#06b6d4">D-${daysToHarvest}</strong></span>
    </div>
  `;

  // 수확량 예측 (포도만)
  const harvestCard = document.getElementById('harvest-card');
  if (CURRENT_CROP === '포도') {
    harvestCard.style.display = 'block';
    renderHarvest();
  } else {
    harvestCard.style.display = 'none';
  }
}

function renderHarvest() {
  const card = document.getElementById('harvest-card');
  if (CURRENT_CROP !== '포도') return;
  // 착과 데이터 없으면 목표만 표시
  const goalKg = 2000;
  const totalPlants = 565;
  const perPlant = (goalKg / totalPlants).toFixed(1);
  card.innerHTML = `
    <div class="card-label">수확량 예측 · 포도</div>
    <div class="harvest-row">
      <div>
        <div class="harvest-val">목표 ${goalKg.toLocaleString()}kg</div>
        <div class="harvest-sub">300평 기준 · 주당 ${perPlant}kg 목표</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:13px;color:#475569">총 ${totalPlants}주</div>
        <div style="font-size:11px;color:#334155">온실 300 + 노지 265</div>
      </div>
    </div>
    <div style="font-size:12px;color:#475569;margin-top:6px">
      착과 시기에 구역별 착과수 입력하면 예상 수확량 자동 계산됩니다
    </div>
  `;
}

function renderWater(rows) {
  const card = document.getElementById('water-card');
  const data = rows.slice(1).filter(r=>r[0]&&r[2]).slice(-10).reverse();
  if (!data.length) {
    card.innerHTML = `<div class="card-label">최근 관수 · ${CURRENT_CROP}</div><div class="empty">관수 기록 없음</div>`;
    return;
  }
  const today = new Date();
  const lastDate = new Date(data[0][2]);
  const diff = Math.floor((today-lastDate)/86400000);

  // 포도는 온실/노지 분리
  if (CURRENT_CROP === '포도') {
    const greenhouse = data.filter(r => {
      const zone = (r[4]||'').toLowerCase();
      return zone.includes('1동') || zone.includes('2동') || zone.includes('온실') || zone.includes('하우스');
    });
    const outdoor = data.filter(r => {
      const zone = (r[4]||'').toLowerCase();
      return zone.includes('노지');
    });
    const other = data.filter(r => {
      const zone = (r[4]||'').toLowerCase();
      return !zone.includes('1동') && !zone.includes('2동') && !zone.includes('온실') && !zone.includes('하우스') && !zone.includes('노지');
    });

    // 온실 관수 권장량 체크 (5일 1회 15톤 기준)
    const lastGH = greenhouse[0];
    const ghDate = lastGH ? new Date(lastGH[2]) : null;
    const ghDiff = ghDate ? Math.floor((today-ghDate)/86400000) : null;
    const ghWarn = ghDiff !== null && ghDiff >= 5;

    card.innerHTML = `
      <div class="card-label">최근 관수 · 포도</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:10px">
        마지막 관수 <strong style="color:${diff>=3?'#f59e0b':'#10b981'}">${diff}일 전</strong>
        ${ghWarn ? '<span style="color:#ef4444;margin-left:8px">⚠️ 온실 관수 필요 (5일 경과)</span>' : ''}
      </div>

      ${greenhouse.length ? `
      <div class="section-title">🏠 온실 (1동 · 2동)</div>
      <div style="font-size:11px;color:#334155;margin-bottom:6px">권장: 5일 1회 15톤 · 착과기 3일 1회 20톤</div>
      <div class="water-list">
        ${greenhouse.slice(0,3).map(r => `
          <div class="water-item">
            <div>
              <div style="font-weight:500">${r[5]?Number(r[5]).toLocaleString()+'L':r[8]||'-'}</div>
              <div class="water-zone">${r[4]||''} ${r[6]?'· '+r[6]:''}</div>
            </div>
            <div class="water-date">${r[2]||''}</div>
          </div>
        `).join('')}
      </div>` : ''}

      ${outdoor.length ? `
      <div class="section-title" style="margin-top:10px">🌿 노지 비가림</div>
      <div style="font-size:11px;color:#334155;margin-bottom:6px">강우 시 자연공급 · 건조기 보조관수</div>
      <div class="water-list">
        ${outdoor.slice(0,2).map(r => `
          <div class="water-item">
            <div>
              <div style="font-weight:500">${r[5]?Number(r[5]).toLocaleString()+'L':r[8]||'-'}</div>
              <div class="water-zone">${r[4]||''}</div>
            </div>
            <div class="water-date">${r[2]||''}</div>
          </div>
        `).join('')}
      </div>` : ''}

      ${other.length ? `
      <div class="section-title" style="margin-top:10px">기타</div>
      <div class="water-list">
        ${other.slice(0,2).map(r => `
          <div class="water-item">
            <div>
              <div style="font-weight:500">${r[5]?Number(r[5]).toLocaleString()+'L':r[8]||'-'}</div>
              <div class="water-zone">${r[4]||''}</div>
            </div>
            <div class="water-date">${r[2]||''}</div>
          </div>
        `).join('')}
      </div>` : ''}
    `;
    return;
  }

  // 다른 작물은 기존 방식
  card.innerHTML = `
    <div class="card-label">최근 관수 · ${CURRENT_CROP}</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:8px">마지막 관수 <strong style="color:${diff>=3?'#f59e0b':'#10b981'}">${diff}일 전</strong></div>
    <div class="water-list">
      ${data.slice(0,5).map(r => `
        <div class="water-item">
          <div>
            <div>${r[5]?Number(r[5]).toLocaleString()+'L':''} ${r[7]?'· '+r[7]:''}</div>
            <div class="water-zone">${r[4]||''}</div>
          </div>
          <div class="water-date">${r[2]||''}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderSafety(rows) {
  const card = document.getElementById('safety-card');
  const today = new Date();
  const data = rows.slice(1).filter(r=>r[2]&&r[9]).slice(-3).reverse();
  if (!data.length) {
    card.innerHTML = `<div class="card-label">방제 안전기간 · ${CURRENT_CROP}</div><div class="empty">방제 기록 없음</div>`;
    return;
  }
  card.innerHTML = `
    <div class="card-label">방제 안전기간 · ${CURRENT_CROP}</div>
    ${data.map(r => {
      const pestDate = new Date(r[2]);
      const safeDays = parseInt(r[9]) || 0;
      const elapsed = Math.floor((today-pestDate)/86400000);
      const remaining = safeDays - elapsed;
      const cls = remaining <= 0 ? 'safety-ok' : remaining <= 3 ? 'safety-danger' : 'safety-warn';
      const label = remaining <= 0 ? '✅ 완료' : `⚠️ ${remaining}일 남음`;
      return `
        <div class="safety-item">
          <div>
            <div style="font-weight:500">${r[3]||'-'}</div>
            <div style="font-size:11px;color:#64748b">${r[2]} · ${safeDays}일</div>
          </div>
          <div class="safety-days ${cls}">${label}</div>
        </div>
      `;
    }).join('')}
  `;
}

function renderDisease(rows) {
  const card = document.getElementById('disease-card');
  const data = rows.slice(1).filter(r=>r[0]);
  if (!data.length) {
    card.innerHTML = `
      <div class="card-label">병해 경보 · ${CURRENT_CROP}</div>
      <div class="disease-none">
        <span class="dot dot-g"></span>
        <span style="font-size:15px;font-weight:600;color:#10b981">이상 없음</span>
        <div style="font-size:12px;color:#475569;margin-top:4px">병해 기록 없음</div>
      </div>`;
    return;
  }
  const last = data[data.length-1];
  const severity = last[5] || '경';
  const dotCls = severity==='중증'?'dot-r':severity==='중'?'dot-y':'dot-g';
  const badgeCls = severity==='중증'?'badge-r':severity==='중'?'badge-y':'badge-g';
const cropEmoji = CURRENT_CROP==='포도'?'🍇':CURRENT_CROP==='수박'?'🍉':'🥬';
  card.innerHTML = `
    <div class="card-label">병해 경보 · ${CURRENT_CROP}</div>
    <div style="margin-top:4px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span class="dot ${dotCls}"></span>
        <span class="badge ${badgeCls}">${severity}</span>
        <span style="font-size:16px">${cropEmoji}</span>
        <span style="font-size:13px;font-weight:500;color:#e2e8f0">${CURRENT_CROP}</span>
      </div>
      <div style="font-size:15px;font-weight:600;color:#f1f5f9">${last[3]||'-'}</div>
      <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
        <span style="font-size:12px;color:#64748b">📅 ${last[2]||''}</span>
        <span style="font-size:12px;color:#64748b">📍 ${last[4]||''}</span>
      </div>
      ${last[6]?`<div style="font-size:12px;color:#94a3b8;margin-top:4px">발생비율: ${last[6]}%</div>`:''}
      ${last[7]?`<div style="font-size:12px;color:#06b6d4;margin-top:4px">✅ 조치: ${last[7]}</div>`:''}
    </div>
  `;
}

loadData();
setInterval(loadData, 300000);
</script>
</body>
</html>
